name: Release
on:
  workflow_dispatch:
    inputs:
      version_tag:
        type: string
        description: Version tag
        default: "1.0.0"
        required: true
      unit_tests:
        description: Run unit tests
        type: boolean
        required: true
        default: false

jobs:
  build-artifacts:
    permissions:
      contents: write

    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm-based Macs (M1 and above).
            args: "--target aarch64-apple-darwin"
            yaak_arch: "arm64"
            os: "macos"
            name: "Mac OS ARM64"
            targets: "aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel-based Macs.
            args: "--target x86_64-apple-darwin"
            yaak_arch: "x64"
            os: "macos"
            name: "Mac OS x64"
            targets: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
            yaak_arch: "x64"
            os: "ubuntu"
            name: "Linux x64"
            targets: ""
          - platform: "ubuntu-22.04-arm"
            args: ""
            yaak_arch: "arm64"
            os: "ubuntu"
            name: "Linux ARM64"
            targets: ""
          - platform: "windows-latest"
            args: ""
            yaak_arch: "x64"
            os: "windows"
            name: "Windows x64"
            targets: ""
          # Windows ARM64
          - platform: "windows-latest"
            args: "--target aarch64-pc-windows-msvc"
            yaak_arch: "arm64"
            os: "windows"
            name: "Windows ARM64"
            targets: "aarch64-pc-windows-msvc"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Install Dependencies
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev xdg-utils

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install JS modules
        run: npm ci
      - name: Bootstrapping
        run: npm run bootstrap
      - name: Run JS Tests
        run: npm test
        if: ${{ github.event.inputs.unit_tests == 'true' }}
      - name: Run Rust Tests
        run: cargo test --all --exclude yaak-cli
        if: ${{ github.event.inputs.unit_tests == 'true' }}

      - name: Set Version
        run: npm run replace-version
        env:
          YAAK_VERSION: ${{ github.event.inputs.version_tag }}

      - name: Build Release
        uses: tauri-apps/tauri-action@v0
        env:
          YAAK_TARGET_ARCH: ${{ matrix.yaak_arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "v__VERSION__"
          releaseName: "Release __VERSION__"
          releaseBody: "Stable release of **Yaak** version __VERSION__"
          releaseDraft: true
          prerelease: false
          uploadPlainBinary: false
          assetNamePattern: '[name]-[version]-[platform]-[arch][setup][ext]'
          args: "${{ matrix.args }} --config ./crates-tauri/yaak-app/tauri.release.conf.json"

      # Build a per-machine NSIS installer for enterprise deployment (PDQ, SCCM, Intune)
      - name: Build Installer (Windows only)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          YAAK_TARGET_ARCH: ${{ matrix.yaak_arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          npx tauri bundle ${{ matrix.args }} --bundles nsis --config ./crates-tauri/yaak-app/tauri.release.conf.json --config '{"bundle":{"createUpdaterArtifacts":false,"windows":{"nsis":{"installMode":"perMachine"}}}}'
          $setup = Get-ChildItem -Recurse -Path target -Filter "*setup*.exe" | Select-Object -First 1
          $dest = $setup.FullName -replace '-setup\.exe$', '-setup-machine.exe'
          $dest = $dest.Replace('_', '-')
          Copy-Item $setup.FullName $dest
          gh release upload "v${{ github.event.inputs.version_tag }}" "$dest" --clobber
